<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HRMS - Employees</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <script>
        (async function () {
            try { const r = await fetch('/api/me'); if (r.ok) { const me = await r.json(); if (!me || me.role !== 'ADMIN') { window.location = '/static/dashboard.html'; } } else { window.location = '/static/index.html'; } } catch (e) { window.location = '/static/index.html'; }
        })();
    </script>
    <div class="app">
        <aside class="sidebar">
            <h2>HRMS</h2>
            <nav>
                <a href="/static/dashboard.html"><svg viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 13h8V3H3v10zM3 21h8v-6H3v6zM13 21h8V11h-8v10zM13 3v6h8V3h-8z" fill="currentColor" />
                    </svg><span>Dashboard</span></a>
                <a href="/static/employees.html" class="active"><svg viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm-7 9a7 7 0 0 1 14 0H5z" fill="currentColor" />
                    </svg><span>Employees</span></a>
                <a href="/static/departments.html"><svg viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 13h8V3H3v10zm10 8h8v-6h-8v6zM13 3v6h8V3h-8z" fill="currentColor" />
                    </svg><span>Departments</span></a>
                <a href="/static/attendance.html"><svg viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 7V12l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg><span>Attendance</span></a>
                <a href="/static/leaves.html"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg><span>Leaves</span></a>
                <a href="#" id="logout"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg><span>Logout</span></a>
            </nav>
        </aside>
        <main class="main">
            <header>
                <h1>Employees</h1>
                <div class="toolbar">
                    <input id="search" placeholder="Search by name, id, email">
                    <button id="addBtn" class="btn">
                        + Add Employee
                    </button>

                </div>
            </header>
            <table class="data-table" id="empTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Emp ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Designation</th>
                        <th>Dept</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </main>
    </div>

    <!-- Modal (simple) -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Add Employee</h3>
            <form id="empForm">
                <input name="id" type="hidden">
                <label>Emp ID</label><input name="empId" required>
                <label>Full Name</label><input name="fullName" required>
                <label>Email</label><input name="email" type="email" required>
                <label>Phone</label><input name="phone">
                <label>Designation</label><input name="designation">
                <label>Department</label><input name="department">
                <label>Joining Date</label><input name="joiningDate" type="date">
                <label>Salary</label><input name="salary" type="number" step="0.01">
                <div class="modal-actions">
                    <button type="submit">Save</button>
                    <button type="button" id="cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
